<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Text Diff Tool</title>

        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="app-container">
            <!-- ヘッダー -->
            <header class="app-header">
                <div class="header-info">
                    <h1 class="header-title">テキスト比較ツール</h1>
                </div>

                <!-- 比較モード選択 -->
                <div class="mode-selector">
                    <label
                        for="diffMode"
                        class="mode-label"
                        >比較モード:</label
                    >
                    <select
                        id="diffMode"
                        class="select-input"
                    >
                        <option value="chars">文字ごと</option>
                        <option
                            value="words"
                            selected
                        >
                            単語ごと
                        </option>
                        <option value="lines">行ごと</option>
                    </select>
                </div>
            </header>

            <!-- 入力エリア -->
            <div class="input-grid">
                <!-- 変更前テキスト -->
                <div class="card textarea-card">
                    <div class="card-header">
                        <h2 class="card-title">変更前</h2>
                        <button
                            id="clearOriginalBtn"
                            class="clear-btn"
                        >
                            クリア
                        </button>
                    </div>
                    <div class="textarea-container">
                        <textarea
                            id="originalText"
                            class="custom-textarea"
                            placeholder="ここに元のテキストを入力してください"
                        ></textarea>
                    </div>
                </div>

                <!-- 入れ替えボタン (デスクトップ用) -->
                <button
                    id="swapBtn"
                    class="swap-btn desktop-only"
                    title="テキストを入れ替える"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="icon"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"
                        />
                    </svg>
                </button>

                <!-- 変更後テキスト -->
                <div class="card textarea-card">
                    <div class="card-header">
                        <h2 class="card-title">変更後</h2>
                        <button
                            id="clearModifiedBtn"
                            class="clear-btn"
                        >
                            クリア
                        </button>
                    </div>
                    <div class="textarea-container">
                        <textarea
                            id="modifiedText"
                            class="custom-textarea"
                            placeholder="ここに変更後のテキストを入力してください"
                        ></textarea>
                    </div>
                </div>

                <!-- モバイル用入れ替えボタン -->
                <div class="mobile-only swap-btn-mobile-wrapper">
                    <button
                        id="swapBtnMobile"
                        class="swap-btn-mobile"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="icon"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"
                            />
                        </svg>
                        テキストを入れ替える
                    </button>
                </div>
            </div>

            <!-- 比較結果表示エリア -->
            <div class="card results-card">
                <div class="results-header">
                    <h2 class="results-title">比較結果</h2>

                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-color color-removed"></span>
                            <span class="legend-label">削除されている</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color color-added"></span>
                            <span class="legend-label">追加されている</span>
                        </div>
                    </div>
                </div>

                <div
                    id="diffOutput"
                    class="diff-output"
                >
                    ここに比較結果が表示されます
                </div>
            </div>

            <!-- コピー機能付きフッター -->
            <div class="actions-footer">
                <button
                    id="sampleBtn"
                    class="btn btn-secondary"
                >
                    サンプルを入力
                </button>
                <button
                    id="copyBtn"
                    class="btn btn-primary"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="icon"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
                        />
                    </svg>
                    結果をコピー
                </button>
            </div>
        </div>

        <!-- メッセージボックス(トースト) -->
        <div
            id="toast"
            class="toast"
        >
            コピーしました！
        </div>

        <script
            type="module"
            src="/src/main.ts"
        ></script>
    </body>
</html>
